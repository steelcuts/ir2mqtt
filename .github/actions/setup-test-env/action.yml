name: 'Setup Test Environment'
description: >
  Creates a Python venv, installs backend deps, installs Node + frontend deps,
  and installs Playwright browsers. Used by e2e-test and e2e-integration-test jobs.

inputs:
  playwright-browsers:
    description: 'Space-separated Playwright browsers to install (e.g. "chromium firefox")'
    required: false
    default: 'chromium firefox'

runs:
  using: composite
  steps:
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Create venv and install Python dependencies
      shell: bash
      run: |
        python -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install -r requirements.dev.txt
        mkdir -p dist

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      shell: bash
      working-directory: ./frontend
      run: npm ci

    - name: Install Playwright browsers
      shell: bash
      working-directory: ./frontend
      run: npx playwright install --with-deps ${{ inputs.playwright-browsers }}
