name: CI

on:
  push:
    branches: ["main", "master"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Simulator (Qt GUI tests — needs xvfb) ───────────────────────────────────
  simulator-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libxcb-cursor0 \
            libgl1 libxcb-shape0 libxcb-xinput0

      - name: Install dependencies
        working-directory: tools/simulator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint with Ruff
        working-directory: tools/simulator
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        working-directory: tools/simulator
        run: xvfb-run pytest

  # ── Backend (unit tests + lint) ──────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt
          mkdir -p dist

      - name: Lint with Ruff
        run: |
          ruff check backend tools
          ruff format --check backend tools

      - name: Run tests
        run: pytest backend/tests -p no:pytest-qt -q

  # ── Frontend (unit tests + lint + build) ─────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  # ── E2E tests (mocked — uses scripts/run-e2e.sh) ────────────────────────────
  e2e-test:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          playwright-browsers: chromium firefox

      - name: Run E2E tests
        run: make test-e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Integration E2E tests (real MQTT stack via Docker) ───────────────────────
  e2e-integration-test:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup test environment
        uses: ./.github/actions/setup-test-env
        with:
          playwright-browsers: chromium

      - name: Run integration E2E tests
        working-directory: ./frontend
        run: npm run test:e2e:integration

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-integration-report
          path: frontend/playwright-report-integration/
          retention-days: 7

  # ── Publish Docker Image ─────────────────────────────────────────────────────
  build-and-push-image:
    needs: [simulator-test, e2e-test, e2e-integration-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.addon
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
